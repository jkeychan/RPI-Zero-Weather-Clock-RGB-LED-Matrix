name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 6am UTC

jobs:
  zizmor:
    name: zizmor (workflow security scan)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pip install zizmor

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --format sarif . > zizmor.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # ratchet:github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  ratchet-check:
    name: ratchet (pinned action SHAs)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install ratchet
        run: |
          curl -sSfL https://github.com/sethvargo/ratchet/releases/latest/download/ratchet_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin ratchet

      - name: Check all workflows are pinned
        run: ratchet check .github/workflows/*.yml
