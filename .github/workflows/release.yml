name: Build and Release ARMv6 Binary

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim@sha256:b29f74a267526ae6ea104eed6c46133b0ca70ce812525df8cd5817698f0a624a # ratchet:debian:bookworm-slim

    steps:
      # git must be present before checkout runs inside the container
      - name: Bootstrap container
        run: apt-get update -q && apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install cross-compile dependencies
        run: |
          dpkg --add-architecture armhf
          apt-get update -q
          apt-get install -y --no-install-recommends \
            crossbuild-essential-armhf \
            libcurl4-openssl-dev \
            libcurl4:armhf \
            libmosquitto-dev \
            libmosquitto1:armhf
          # The Bookworm cross-compiler sysroot does not include /usr/include by
          # default. Copy arch-independent headers into the sysroot explicitly.
          CURL_HDR_DIR=$(dpkg -L libcurl4-openssl-dev | grep 'curl\.h$' | xargs dirname)
          mkdir -p /usr/arm-linux-gnueabihf/include/curl
          cp -n "$CURL_HDR_DIR"/*.h /usr/arm-linux-gnueabihf/include/curl/
          cp /usr/include/mosquitto.h /usr/arm-linux-gnueabihf/include/
          # Create .so symlinks so the cross-linker resolves -lcurl and -lmosquitto.
          # The dev packages for armhf conflict with their amd64 counterparts via
          # shared binaries (curl-config etc.), so we install only the runtime libs
          # and create the linker symlinks manually.
          ln -sf libcurl.so.4 /usr/lib/arm-linux-gnueabihf/libcurl.so
          ln -sf libmosquitto.so.1 /usr/lib/arm-linux-gnueabihf/libmosquitto.so

      - name: Build librgbmatrix for ARMv6
        run: |
          cd matrix/lib
          make CC=arm-linux-gnueabihf-gcc \
               CXX=arm-linux-gnueabihf-g++ \
               CFLAGS="-march=armv6 -marm -mfpu=vfp -mfloat-abi=hard" \
               CXXFLAGS="-march=armv6 -marm -mfpu=vfp -mfloat-abi=hard"
          mkdir -p ../../prebuilt
          cp librgbmatrix.a ../../prebuilt/librgbmatrix_armv6.a

      - name: Cross-compile rgb_display
        run: |
          make pi
          file rgb_display_armv6

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: rgb_display
          path: rgb_display_armv6

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with:
          name: rgb_display

      - name: Verify binary
        run: |
          mv rgb_display_armv6 rgb_display
          file rgb_display
          objdump -p rgb_display | grep GLIBC | sort -t_ -k3 -V | tail -3

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          cat > release-notes.md << NOTES
          Precompiled ARMv6 binary for Raspberry Pi Zero W.
          Requires **Raspberry Pi OS Bookworm** (Debian 12) or later.

          **What's new in ${REF_NAME}:**
          - Optional MQTT weather source — subscribe to a local sensor broker and display live temperature/humidity instead of (or alongside) OpenWeatherMap
          - When MQTT data is fresh, OWM no longer overwrites sensor temperature/humidity; OWM still provides feels-like, sunrise/sunset, and weather description
          - Full logging from the MQTT thread for connection and message diagnostics

          Add an \`[MQTT]\` section to your \`config.ini\` to enable (see README):
          \`\`\`ini
          [MQTT]
          enabled = true
          broker = 192.168.1.x
          port = 1883
          topic = weather/outdoor01
          \`\`\`

          **Fresh install:**
          \`\`\`bash
          git clone https://github.com/${REPOSITORY}.git
          cd RPI-Zero-Weather-Clock-RGB-LED-Matrix
          cp sample-config.ini config.ini && vi config.ini
          bash deploy/install.sh
          wget https://github.com/${REPOSITORY}/releases/download/${REF_NAME}/rgb_display
          chmod +x rgb_display
          sudo apt install libmosquitto1 -y
          sudo systemctl enable --now rgb_display.service
          \`\`\`

          **Update binary only:**
          \`\`\`bash
          cd RPI-Zero-Weather-Clock-RGB-LED-Matrix
          wget -O rgb_display https://github.com/${REPOSITORY}/releases/download/${REF_NAME}/rgb_display
          chmod +x rgb_display
          sudo apt install libmosquitto1 -y
          sudo systemctl restart rgb_display.service
          \`\`\`

          See [BUILDING.md](https://github.com/${REPOSITORY}/blob/main/BUILDING.md) to build from source.
          NOTES
          gh release create "${REF_NAME}" \
            --title "${REF_NAME}" \
            --notes-file release-notes.md \
            rgb_display
