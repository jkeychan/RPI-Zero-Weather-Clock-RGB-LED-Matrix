name: Build and Release ARMv6 Binary

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          # Enable armhf multiarch so we can install ARM libcurl for cross-linking
          sudo dpkg --add-architecture armhf
          # Restrict existing Ubuntu sources to amd64 to avoid fetch errors on Noble
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Types: deb/Architectures: amd64\nTypes: deb/g' \
              /etc/apt/sources.list.d/ubuntu.sources
          fi
          # Add Ubuntu Ports mirror for armhf packages
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/armhf-ports.list
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security main universe
          SOURCES
          sudo apt-get update -q
          # Install amd64 dev package (headers) and armhf runtime library (for linking)
          # libcurl4-openssl-dev:armhf conflicts with amd64 via shared curl-config binary,
          # so install just the runtime lib and create the .so symlink manually
          sudo apt-get install -y crossbuild-essential-armhf libcurl4-openssl-dev libcurl4t64:armhf
          # Copy amd64 curl headers into the ARM cross-compile sysroot
          CURL_HDR_DIR=$(dpkg -L libcurl4-openssl-dev | grep 'curl\.h$' | xargs dirname)
          sudo mkdir -p /usr/arm-linux-gnueabihf/include/curl
          sudo cp -n "$CURL_HDR_DIR"/*.h /usr/arm-linux-gnueabihf/include/curl/
          # Copy ARM libcurl into the cross-linker's sysroot search path and create .so symlink
          sudo cp /usr/lib/arm-linux-gnueabihf/libcurl.so.4* /usr/arm-linux-gnueabihf/lib/
          sudo ln -sf libcurl.so.4 /usr/arm-linux-gnueabihf/lib/libcurl.so

      - name: Build librgbmatrix for ARMv6
        run: |
          cd matrix/lib
          make CC=arm-linux-gnueabihf-gcc \
               CXX=arm-linux-gnueabihf-g++ \
               CFLAGS="-march=armv6 -marm -mfpu=vfp -mfloat-abi=hard" \
               CXXFLAGS="-march=armv6 -marm -mfpu=vfp -mfloat-abi=hard"
          mkdir -p ../../prebuilt
          cp librgbmatrix.a ../../prebuilt/librgbmatrix_armv6.a

      - name: Cross-compile rgb_display
        run: |
          make pi
          file rgb_display_armv6

      - name: Rename binary for release
        run: mv rgb_display_armv6 rgb_display

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # ratchet:softprops/action-gh-release@v2
        with:
          files: rgb_display
          body: |
            Precompiled ARMv6 binary for Raspberry Pi Zero W.

            **Fresh install:**
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd RPI-Zero-Weather-Clock-RGB-LED-Matrix
            cp sample-config.ini config.ini && vi config.ini
            bash deploy/install.sh
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb_display
            chmod +x rgb_display
            sudo systemctl enable --now rgb_display.service
            ```

            **Update binary only:**
            ```bash
            cd RPI-Zero-Weather-Clock-RGB-LED-Matrix
            wget -O rgb_display https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rgb_display
            chmod +x rgb_display
            sudo systemctl restart rgb_display.service
            ```

            See [BUILDING.md](https://github.com/${{ github.repository }}/blob/main/BUILDING.md) to build from source.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
